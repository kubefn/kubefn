# KubeFn Network Policy — Restrict admin endpoints to cluster-internal only
# Apply with: kubectl apply -f network-policy.yaml -n kubefn
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubefn-admin-restrict
  namespace: kubefn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubefn-runtime
  policyTypes:
    - Ingress
  ingress:
    # Allow all traffic to function port (8080)
    - ports:
        - port: 8080
          protocol: TCP
    # Restrict admin port (8081) to same namespace only
    - ports:
        - port: 8081
          protocol: TCP
      from:
        - podSelector: {}  # Same namespace only
---
# Deny all egress except DNS and required services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubefn-egress-restrict
  namespace: kubefn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubefn-runtime
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic within kubefn namespace
    - to:
        - podSelector: {}
    # Allow traffic to kube-system (API server, CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
